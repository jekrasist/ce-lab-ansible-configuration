---
- name: Install webserver packages
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop: "{{ webserver_packages }}"
  # Skip on Mac to avoid Homebrew-as-root error
  when: ansible_facts['os_family'] != "Darwin"

- name: Create document root
  ansible.builtin.file:
    path: "{{ webserver_document_root }}"
    state: directory
    owner: "{{ 'www-data' if ansible_facts['os_family'] != 'Darwin' else ansible_user_id }}"
    group: "{{ 'www-data' if ansible_facts['os_family'] != 'Darwin' else 'staff' }}"
    mode: "0755"

- name: Deploy index page
  ansible.builtin.template:
    src: index.html.j2
    dest: "{{ webserver_document_root }}/index.html"
    owner: "{{ 'www-data' if ansible_facts['os_family'] != 'Darwin' else ansible_user_id }}"
    mode: "0644"
  notify: Restart nginx

- name: Ensure nginx is running
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
